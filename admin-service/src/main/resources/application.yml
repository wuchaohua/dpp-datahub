spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:battery_pass}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
server:
  port: ${SERVER_PORT:8083}
logging:
  level:
    io.batterypass: DEBUG
    org.springframework: INFO
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics