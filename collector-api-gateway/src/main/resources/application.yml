spring:
  application:
    name: collector-api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml
    gateway:
      routes:
        - id: static-data-route
          uri: lb://static-data-service
          predicates:
            - Path=/api/v1/static/**
        - id: dynamic-data-route
          uri: lb://dynamic-data-service
          predicates:
            - Path=/api/v1/dynamic/**
        - id: admin-route
          uri: lb://admin-service
          predicates:
            - Path=/api/v1/admin/**
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter:
              replenishRate: 100
              burstCapacity: 200

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:9000}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    io.batterypass: DEBUG
    org.springframework.cloud.gateway: INFO
