spring:
  application:
    name: dynamic-data-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
server:
  port: ${SERVER_PORT:8082}
mqtt:
  enabled: ${MQTT_ENABLED:true}
  broker:
    url: ${MQTT_BROKER_URL:tcp://localhost:1883}
    client-id: dynamic-data-service
    username: ${MQTT_USER:}
    password: ${MQTT_PASS:}
  topics:
    telemetry: /bms/+/telemetry
    alarm: /bms/+/alarm
  qos: 1
logging:
  level:
    io.batterypass: DEBUG
    org.springframework: INFO
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics