services:
  postgresql:
    image: postgres:15
    container_name: bp-postgresql
    environment:
      POSTGRES_DB: battery_pass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-postgresql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  tdengine:
    image: tdengine/tdengine:3.2.2.0
    container_name: bp-tdengine
    environment:
      TAOS_DEFAULT_PASS: taosdata
    ports:
      - "6030:6030"
      - "6041:6041"
    volumes:
      - tdengine_data:/var/lib/taos

  redis:
    image: redis:7-alpine
    container_name: bp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s

  minio:
    image: minio/minio:latest
    container_name: bp-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: bp-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data

  static-data-service:
    build:
      context: .
      dockerfile: static-data-service/Dockerfile
    container_name: bp-static-data
    environment:
      DB_HOST: postgresql
      DB_PORT: "5432"
    ports:
      - "8081:8081"
    depends_on:
      postgresql:
        condition: service_healthy

  dynamic-data-service:
    build:
      context: .
      dockerfile: dynamic-data-service/Dockerfile
    container_name: bp-dynamic-data
    environment:
      REDIS_HOST: redis
      MQTT_BROKER_URL: tcp://mqtt-broker:1883
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy

  collector-api-gateway:
    build:
      context: .
      dockerfile: collector-api-gateway/Dockerfile
    container_name: bp-api-gateway
    environment:
      STATIC_DATA_HOST: static-data-service
      DYNAMIC_DATA_HOST: dynamic-data-service
      ADMIN_HOST: admin-service
    ports:
      - "8080:8080"
    depends_on:
      - static-data-service
      - dynamic-data-service

  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    container_name: bp-admin
    environment:
      DB_HOST: postgresql
      DB_PORT: "5432"
    ports:
      - "8083:8083"
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  pgdata:
  tdengine_data:
  minio_data:
  mosquitto_data: